name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

defaults:
  run:
    working-directory: scalardl-cleanup

jobs:
  release:
    name: Build and push the release container image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set version
        id: version
        # Enforce the exact vX.Y.Z tag format, since workflow_dispatch can run on
        # any ref, to avoid publishing an image from an invalid tag.
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::This workflow must run on a version tag (vX.Y.Z); got ${GITHUB_REF}"
            exit 1
          fi
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Create container image
        run: ./gradlew :cli:docker -PprojectVersion=${{ steps.version.outputs.version }}

      - name: Push container image
        run: docker push ghcr.io/scalar-labs/scalardl-cleanup:${{ steps.version.outputs.version }}
