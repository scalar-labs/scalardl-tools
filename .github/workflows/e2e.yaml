name: E2E

# End-to-end test for ScalarDL Cleanup. The tool reclaims garbage left behind by an older ScalarDL
# server, while coordinating with the upgraded server. This test reproduces exactly that:
#
#   1. Deploy ScalarDL Ledger + Auditor at the old version on minikube against a real Cosmos DB,
#      load the schema, and populate committed + stranded data with the old client (HashStore CLI).
#   2. Upgrade both servers in place to the new version (which exposes the privileged
#      RecoverAssetLock RPC that finalize-auditor needs).
#   3. Run the three operator-facing cleanup subcommands against the upgraded cluster:
#        finalize-ledger      -> emits the Ledger completion token
#        finalize-auditor     -> recovers the stranded asset locks via RecoverAssetLock and
#                                cleans up request_proof; emits the Auditor completion token
#        cleanup-coordinator  -> deletes the settled coordinator.state records
#   4. Assert, at the ScalarDL application layer, that every existing asset is writable, readable,
#      and passes validate-ledger.
#
# CI-only. Requires repository secrets: COSMOS_URI, COSMOS_KEY, CR_PAT.

on:
  pull_request:
    paths:
      - 'scalardl-cleanup/**'
      - '.github/workflows/e2e.yaml'
  workflow_dispatch:
    inputs:
      old_version:
        description: 'OLD ScalarDL version that populates data'
        default: '3.13.0'
      new_version:
        description: 'NEW ScalarDL server version the tool coordinates with'
        default: '3.14.0-SNAPSHOT'

defaults:
  run:
    working-directory: scalardl-cleanup

# Serialize every run that touches the shared Cosmos account.
concurrency:
  group: cosmos

jobs:
  e2e:
    name: cleanup
    runs-on: ubuntu-latest
    env:
      SCALARDL_OLD_VERSION: ${{ github.event.inputs.old_version || '3.13.0' }}
      SCALARDL_NEW_VERSION: ${{ github.event.inputs.new_version || '3.14.0-SNAPSHOT' }}
      GHCR_USER: ${{ github.repository_owner }}
      # Records generated per category (committed / stranded write / stranded read).
      RECORD_COUNT: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the cleanup CLI
        # GPR_* let Gradle pull the ScalarDL artifacts from GitHub Packages.
        env:
          GPR_USERNAME: ${{ github.repository_owner }}
          GPR_PASSWORD: ${{ secrets.CR_PAT }}
        run: |
          set -euo pipefail
          ./gradlew :cli:installDist
          echo "CLEANUP=$(pwd)/cli/build/install/scalardl-cleanup/bin/scalardl-cleanup" >> "$GITHUB_ENV"

      - name: Install Azure Cosmos DB Shell
        # Used by run-cleanup.sh to count rows directly in Cosmos for the post-cleanup reclamation
        # checks.
        run: |
          set -euo pipefail
          v=1.1.4
          url="https://github.com/Azure/CosmosDBShell/releases/download/v${v}/cosmosdbshell_linux-x64_${v}-preview.zip"
          curl -sSfL -o "$RUNNER_TEMP/cosmosdbshell.zip" "$url"
          unzip -q "$RUNNER_TEMP/cosmosdbshell.zip" -d "$RUNNER_TEMP/cosmosdbshell"
          bin="$(find "$RUNNER_TEMP/cosmosdbshell" -type f -name cosmosdbshell | head -n1)"
          [ -n "$bin" ] || { echo "::error::cosmosdbshell binary not found in the archive"; exit 1; }
          chmod +x "$bin"
          echo "COSMOSDB_SHELL=$bin" >> "$GITHUB_ENV"

      - name: Download ScalarDL HashStore CLI
        # The garbage is created by the old-version client, so the CLI tracks SCALARDL_OLD_VERSION.
        run: |
          set -euo pipefail
          v="$SCALARDL_OLD_VERSION"
          url="https://github.com/scalar-labs/scalardl/releases/download/v${v}/scalardl-hashstore-java-client-sdk-${v}.zip"
          curl -sSfL -o "$RUNNER_TEMP/hashstore.zip" "$url"
          unzip -q "$RUNNER_TEMP/hashstore.zip" -d "$RUNNER_TEMP/hashstore"
          bin="$RUNNER_TEMP/hashstore/scalardl-hashstore-java-client-sdk-${v}/bin/scalardl-hashstore"
          chmod +x "$bin"
          echo "CLIENT=$bin" >> "$GITHUB_ENV"

      - name: Set up minikube
        uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
        with:
          cpus: '4'
          memory: '8192'

      - name: Deploy ScalarDL (old version) + load schema
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          CR_PAT: ${{ secrets.CR_PAT }}
          SCALARDL_VERSION: ${{ env.SCALARDL_OLD_VERSION }}
        run: ./ci/e2e/manage-cluster.sh deploy

      - name: Populate committed data
        run: |
          set -euo pipefail
          source ci/e2e/port-forward.sh
          pf_reset
          pf_start ledger-e2e  svc/ledger  50051:50051 50052:50052
          pf_start auditor-e2e svc/auditor 40051:40051 40052:40052
          pf_wait 50051 50052 40051 40052
          props="ci/e2e/client.properties"
          # Register the client identity + the generic object contracts on both servers.
          "$CLIENT" bootstrap --properties "$props"
          # Commit RECORD_COUNT objects. In auditor mode each put-object (object.Put = get+put)
          # produces asset / request_proof / coordinator.state / released asset_lock records.
          for i in $(seq 0 $((RECORD_COUNT - 1))); do
            id="e2e-asset-$i"
            hash=$(printf '%s' "$id" | sha256sum | cut -d' ' -f1)
            "$CLIENT" put-object --properties "$props" --object-id "$id" --hash "$hash"
          done

      - name: Generate stranded locks (Ledger down)
        run: |
          set -euo pipefail
          source ci/e2e/port-forward.sh
          pf_reset
          ./ci/e2e/manage-cluster.sh stop-ledger
          pf_start auditor-e2e svc/auditor 40051:40051 40052:40052
          pf_wait 40051 40052
          props="ci/e2e/client.properties"
          # Every op MUST fail (Ledger down): the Auditor is left holding the lock. Fail the job if
          # any unexpectedly succeeds. put-object leaves a WRITE lock on a fresh id; get-object leaves
          # a READ lock on an already-committed id.
          for i in $(seq 0 $((RECORD_COUNT - 1))); do
            id="e2e-stranded-$i"
            hash=$(printf '%s' "$id" | sha256sum | cut -d' ' -f1)
            if "$CLIENT" put-object --properties "$props" --object-id "$id" --hash "$hash"; then
              echo "::error::stranded put-object on $id unexpectedly succeeded (Ledger was supposed to be down)"; exit 1
            fi
          done
          for i in $(seq 0 $((RECORD_COUNT - 1))); do
            id="e2e-asset-$i"
            if "$CLIENT" get-object --properties "$props" --object-id "$id"; then
              echo "::error::stranded get-object on $id unexpectedly succeeded (Ledger was supposed to be down)"; exit 1
            fi
          done
          echo "Waiting 16s for the held locks to pass the 15s valid period ..."
          sleep 16

      # Record what was populated. The verify step reads this back (single source of truth for the
      # asset ids), and it is uploaded as an artifact for inspection. strandedReadAssetIds are the
      # committed ids that also received a stranded READ lock (== committedAssetIds here).
      - name: Write populated-assets metadata
        run: |
          jq -n --argjson n "$RECORD_COUNT" '{
            entityId: "e2e-client",
            committedAssetIds: [range(0; $n) | "e2e-asset-\(.)"],
            strandedAssetIds: [range(0; $n) | "e2e-stranded-\(.)"],
            strandedReadAssetIds: [range(0; $n) | "e2e-asset-\(.)"]
          }' > "$RUNNER_TEMP/populated-assets.json"

      - name: Upgrade ScalarDL to the new version
        env:
          SCALARDL_VERSION: ${{ env.SCALARDL_NEW_VERSION }}
        run: ./ci/e2e/manage-cluster.sh upgrade

      - name: Run the cleanup commands
        run: ./ci/e2e/run-cleanup.sh

      - name: Verify post-cleanup consistency
        run: |
          set -euo pipefail
          source ci/e2e/port-forward.sh
          pf_reset
          pf_start ledger-e2e  svc/ledger  50051:50051 50052:50052
          pf_start auditor-e2e svc/auditor 40051:40051 40052:40052
          pf_wait 50051 50052 40051 40052
          props="ci/e2e/client.properties"
          populated="$RUNNER_TEMP/populated-assets.json"

          # After cleanup, every asset must be fully usable again: writable, readable, and passing
          # ledger validation.
          while IFS= read -r id; do
            hash=$(printf '%s' "$id" | sha256sum | cut -d' ' -f1)
            if ! "$CLIENT" put-object --properties "$props" --object-id "$id" --hash "$hash"; then
              echo "::error::put-object on $id failed after cleanup"; exit 1
            fi
            if ! "$CLIENT" get-object --properties "$props" --object-id "$id"; then
              echo "::error::get-object on $id failed after cleanup"; exit 1
            fi
            if ! "$CLIENT" validate-ledger --properties "$props" --object-id "$id"; then
              echo "::error::validate-ledger on $id failed after cleanup"; exit 1
            fi
          done < <(jq -r '(.committedAssetIds + .strandedAssetIds)[]' "$populated")
          echo "Post-cleanup consistency verified."

      - name: Upload populated-assets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-populated-assets
          path: ${{ runner.temp }}/populated-assets.json
          if-no-files-found: warn

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          set +e
          for ns in ledger-e2e auditor-e2e; do
            echo "===== namespace: $ns ====="
            kubectl -n "$ns" get all -o wide
            kubectl -n "$ns" get events --sort-by=.lastTimestamp
            kubectl -n "$ns" describe pods
            for p in $(kubectl -n "$ns" get pods -o name 2>/dev/null); do
              echo "----- logs $p -----"
              kubectl -n "$ns" logs "$p" --all-containers --prefix --tail=300
            done
          done
          echo "===== port-forward logs ====="
          cat /tmp/pf-*.log 2>/dev/null || true
          echo "===== cleanup tool stderr logs ====="
          for f in "$RUNNER_TEMP"/finalize-ledger.err "$RUNNER_TEMP"/finalize-auditor.err "$RUNNER_TEMP"/cleanup-coordinator.err; do
            [ -f "$f" ] && { echo "----- $f -----"; cat "$f"; }
          done

      - name: Drop Cosmos schema
        if: always()
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          CR_PAT: ${{ secrets.CR_PAT }}
          SCALARDL_VERSION: ${{ env.SCALARDL_OLD_VERSION }}
        # Fatal on purpose: the shared Cosmos account must be left clean, so a failed
        # drop fails the job to alert an operator (who then drops it manually).
        run: ./ci/e2e/manage-cluster.sh drop-schema

      - name: Tear down namespaces
        if: always()
        run: ./ci/e2e/manage-cluster.sh clean
