name: E2E Verify (full pipeline)

# The real end-to-end test for coordinator-state-deleter:
#   1. deploy ScalarDL - 3.13 on minikube
#   2. populate committed + stranded auditor-mode data
#   3. switch servers to 3.14 +
#   4. run the CLI 3 commands against 3.14 + and assert the outcome
#
# Requires repository secrets: COSMOS_URI, COSMOS_KEY, CR_PAT.

on:
  push: # TODO: remove this after review
    branches: [add-e2e]
    paths:
      - 'coordinator-state-deleter/**'
      - '.github/workflows/e2e-verify.yaml'
  pull_request:
    paths:
      - 'coordinator-state-deleter/**'
      - '.github/workflows/e2e-verify.yaml'
  workflow_dispatch: # These defaults pre-fill the dispatch form. Non-dispatch triggers
    # (push/pull_request/schedule) fall back to the same values in the job env below.
    inputs:
      populate_version:
        description: 'ScalarDL version for populate / old data'
        default: '3.13.0'
      verify_version:
        description: 'ScalarDL version for verify / tool run'
        default: '3.14.0-SNAPSHOT'

defaults:
  run:
    working-directory: coordinator-state-deleter

concurrency:
  group: e2e-cosmos
  cancel-in-progress: false

jobs:
  e2e:
    name: populate → upgrade → verify
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      POPULATE_VERSION: ${{ github.event.inputs.populate_version || '3.13.0' }}
      VERIFY_VERSION: ${{ github.event.inputs.verify_version || '3.14.0-SNAPSHOT' }}
      GHCR_USER: ${{ github.actor }}
      GPR_USERNAME: ${{ github.actor }}
      GPR_PASSWORD: ${{ secrets.CR_PAT }}
      COSMOS_URI: ${{ secrets.COSMOS_URI }}
      COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
      CR_PAT: ${{ secrets.CR_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Render client.properties (inject Cosmos credentials)
        # Shared by populate and verify at a fixed path both gradle tasks read (e2e module build
        # dir). Only ${COSMOS_URI}/${COSMOS_KEY} are substituted.
        run: |
          mkdir -p e2e/build
          envsubst '${COSMOS_URI} ${COSMOS_KEY}' < ci/e2e/client.properties > e2e/build/client.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up minikube
        uses: medyagh/setup-minikube@latest
        with:
          cpus: '4'
          memory: '8192'

      - name: Deploy ScalarDL (populate version)
        env:
          LEDGER_VERSION: ${{ env.POPULATE_VERSION }}
          AUDITOR_VERSION: ${{ env.POPULATE_VERSION }}
          SCHEMA_LOADER_VERSION: ${{ env.POPULATE_VERSION }}
        run: ./ci/e2e/manage-cluster.sh deploy

      - name: Populate committed data
        run: |
          set -euo pipefail
          LNS="ledger-e2e"; ANS="auditor-e2e"
          source ci/e2e/port-forward.sh
          pf_reset
          pf_start "$LNS" svc/ledger  50051:50051 50052:50052
          pf_start "$ANS" svc/auditor 40051:40051 40052:40052
          pf_wait 50051 50052 40051 40052
          ./gradlew :e2e:e2ePopulate -De2e.mode=committed

      - name: Generate stranded lock (Ledger down)
        run: |
          set -euo pipefail
          LNS="ledger-e2e"; ANS="auditor-e2e"
          source ci/e2e/port-forward.sh
          pf_reset
          # Take the Ledger down so the auditor-mode write cannot commit (stranded lock).
          kubectl -n "$LNS" scale deployment/scalardl-ledger --replicas=0
          kubectl -n "$LNS" wait --for=delete pod -l app=scalardl-ledger --timeout=120s
          pf_start "$ANS" svc/auditor 40051:40051 40052:40052
          pf_wait 40051 40052
          ./gradlew :e2e:e2ePopulate -De2e.mode=stranded
          echo "Waiting 16s for the held lock to pass the 15s valid period ..."
          sleep 16

      - name: Switch servers to verify version
        env:
          LEDGER_VERSION: ${{ env.VERIFY_VERSION }}
          AUDITOR_VERSION: ${{ env.VERIFY_VERSION }}
        run: ./ci/e2e/manage-cluster.sh redeploy

      - name: Run verify (CLI 3 commands)
        run: |
          set -euo pipefail
          LNS="ledger-e2e"; ANS="auditor-e2e"
          source ci/e2e/port-forward.sh
          pf_reset
          pf_start "$LNS" svc/ledger  50051:50051 50052:50052
          pf_start "$ANS" svc/auditor 40051:40051 40052:40052
          pf_wait 50051 50052 40051 40052
          ./gradlew :e2e:minikubeE2eTest

      - name: Upload verify test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-verify-report
          path: coordinator-state-deleter/e2e/build/reports/tests/minikubeE2eTest/
          if-no-files-found: warn

      - name: Upload seed-metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-seed-metadata
          path: coordinator-state-deleter/e2e/build/e2e/seed-metadata.json
          if-no-files-found: warn

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          set +e
          mkdir -p /tmp/e2e-diag
          cp /tmp/pf-*.log /tmp/e2e-diag/ 2>/dev/null
          for ns in ledger-e2e auditor-e2e; do
            kubectl -n "$ns" get all -o wide            > "/tmp/e2e-diag/${ns}-get-all.txt" 2>&1
            kubectl -n "$ns" describe pods              > "/tmp/e2e-diag/${ns}-describe-pods.txt" 2>&1
            kubectl -n "$ns" get events --sort-by=.lastTimestamp > "/tmp/e2e-diag/${ns}-events.txt" 2>&1
            for p in $(kubectl -n "$ns" get pods -o name 2>/dev/null); do
              safe=$(echo "$p" | tr '/' '_')
              kubectl -n "$ns" logs "$p" --all-containers --prefix --tail=300 > "/tmp/e2e-diag/${ns}-${safe}.log" 2>&1
            done
          done

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-verify-diagnostics
          path: /tmp/e2e-diag/

      - name: Drop Cosmos schema
        if: always()
        # Must run before namespace teardown (it uses the in-namespace ConfigMap + ghcr-secret).
        run: ./ci/e2e/manage-cluster.sh drop-schema

      - name: Tear down namespaces
        if: always()
        run: ./ci/e2e/manage-cluster.sh clean
