name: CI

on:
  # Temporary: validate on the feature branch via push. Remove this 'push' block
  # when merging to master (rely on pull_request + workflow_dispatch).
  push:
    branches: [add-e2e]
    paths:
      - 'coordinator-state-deleter/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    paths:
      - 'coordinator-state-deleter/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

defaults:
  run:
    working-directory: coordinator-state-deleter

jobs:
  check:
    name: Check (unit tests + spotless)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run check
        # GPR credentials are needed to resolve the scalardl-java-client-sdk
        # 4.0.0-SNAPSHOT from GitHub Packages (used by cli/e2e and the orchestrators).
        env:
          GPR_USERNAME: ${{ github.actor }}
          GPR_PASSWORD: ${{ secrets.CR_PAT }}
        run: |
          ./gradlew \
            :common:check \
            :resumable-scan:check \
            :coordinator-state-cleanup:check \
            :ledger-finalize-records:check \
            :auditor-finalize-records:check \
            :request-proof-cleanup:check \
            :cli:check \
            :e2e:check

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-reports
          path: |
            coordinator-state-deleter/common/build/reports/tests/test/
            coordinator-state-deleter/resumable-scan/build/reports/tests/test/
            coordinator-state-deleter/coordinator-state-cleanup/build/reports/tests/test/
            coordinator-state-deleter/ledger-finalize-records/build/reports/tests/test/
            coordinator-state-deleter/auditor-finalize-records/build/reports/tests/test/
            coordinator-state-deleter/request-proof-cleanup/build/reports/tests/test/
            coordinator-state-deleter/cli/build/reports/tests/test/

  integration-test:
    name: Cosmos DB integration test (resumable-scan)
    needs: check
    # Skip the whole Cosmos integration chain on the temporary add-e2e push so it
    # doesn't run heavy 5-job Cosmos tests (and contend on RU with e2e-verify) on
    # every iteration. The chain is 'needs'-linked, so skipping this skips the rest.
    # Runs normally on pull_request.
    if: github.event_name != 'push' || github.ref_name != 'add-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :resumable-scan:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: coordinator-state-deleter/resumable-scan/build/reports/tests/cosmosIntegrationTest/

  ledger-finalize-integration-test:
    name: Cosmos DB integration test (ledger-finalize-records)
    needs: integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :ledger-finalize-records:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ledger-finalize-integration-test-reports
          path: coordinator-state-deleter/ledger-finalize-records/build/reports/tests/cosmosIntegrationTest/

  auditor-finalize-integration-test:
    name: Cosmos DB integration test (auditor-finalize-records)
    needs: ledger-finalize-integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :auditor-finalize-records:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auditor-finalize-integration-test-reports
          path: coordinator-state-deleter/auditor-finalize-records/build/reports/tests/cosmosIntegrationTest/

  coordinator-cleanup-integration-test:
    name: Cosmos DB integration test (coordinator-state-cleanup)
    needs: auditor-finalize-integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :coordinator-state-cleanup:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-cleanup-integration-test-reports
          path: coordinator-state-deleter/coordinator-state-cleanup/build/reports/tests/cosmosIntegrationTest/

  request-proof-cleanup-integration-test:
    name: Cosmos DB integration test (request-proof-cleanup)
    needs: coordinator-cleanup-integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :request-proof-cleanup:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: request-proof-cleanup-integration-test-reports
          path: coordinator-state-deleter/request-proof-cleanup/build/reports/tests/cosmosIntegrationTest/
