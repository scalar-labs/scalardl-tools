name: CI

on:
  push:
    branches: [master]
    paths:
      - 'scalardl-cleanup/common/**'
      - 'scalardl-cleanup/resumable-scan/**'
      - 'scalardl-cleanup/coordinator-state-cleanup/**'
      - 'scalardl-cleanup/ledger-finalize-records/**'
      - 'scalardl-cleanup/auditor-finalize-records/**'
      - 'scalardl-cleanup/request-proof-cleanup/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    paths:
      - 'scalardl-cleanup/common/**'
      - 'scalardl-cleanup/resumable-scan/**'
      - 'scalardl-cleanup/coordinator-state-cleanup/**'
      - 'scalardl-cleanup/ledger-finalize-records/**'
      - 'scalardl-cleanup/auditor-finalize-records/**'
      - 'scalardl-cleanup/request-proof-cleanup/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

# Serialize every run that touches the shared Cosmos account.
concurrency:
  group: cosmos

defaults:
  run:
    working-directory: scalardl-cleanup

jobs:
  check:
    name: Check (unit tests + spotless)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run check
        run: |
          ./gradlew \
            :common:check \
            :resumable-scan:check \
            :coordinator-state-cleanup:check \
            :ledger-finalize-records:check \
            :auditor-finalize-records:check \
            :request-proof-cleanup:check

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-reports
          path: |
            scalardl-cleanup/common/build/reports/tests/test/
            scalardl-cleanup/resumable-scan/build/reports/tests/test/
            scalardl-cleanup/coordinator-state-cleanup/build/reports/tests/test/
            scalardl-cleanup/ledger-finalize-records/build/reports/tests/test/
            scalardl-cleanup/auditor-finalize-records/build/reports/tests/test/
            scalardl-cleanup/request-proof-cleanup/build/reports/tests/test/

  integration-test:
    name: Cosmos DB integration test (resumable-scan)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :resumable-scan:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: scalardl-cleanup/resumable-scan/build/reports/tests/cosmosIntegrationTest/

  ledger-finalize-integration-test:
    name: Cosmos DB integration test (ledger-finalize-records)
    needs: integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :ledger-finalize-records:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ledger-finalize-integration-test-reports
          path: scalardl-cleanup/ledger-finalize-records/build/reports/tests/cosmosIntegrationTest/

  auditor-finalize-integration-test:
    name: Cosmos DB integration test (auditor-finalize-records)
    needs: ledger-finalize-integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :auditor-finalize-records:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auditor-finalize-integration-test-reports
          path: scalardl-cleanup/auditor-finalize-records/build/reports/tests/cosmosIntegrationTest/

  coordinator-cleanup-integration-test:
    name: Cosmos DB integration test (coordinator-state-cleanup)
    needs: auditor-finalize-integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :coordinator-state-cleanup:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-cleanup-integration-test-reports
          path: scalardl-cleanup/coordinator-state-cleanup/build/reports/tests/cosmosIntegrationTest/

  request-proof-cleanup-integration-test:
    name: Cosmos DB integration test (request-proof-cleanup)
    needs: coordinator-cleanup-integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :request-proof-cleanup:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: request-proof-cleanup-integration-test-reports
          path: scalardl-cleanup/request-proof-cleanup/build/reports/tests/cosmosIntegrationTest/
