name: CI

on:
  push:
    branches: [master]
    paths:
      - 'coordinator-state-deleter/common/**'
      - 'coordinator-state-deleter/resumable-scan/**'
      - 'coordinator-state-deleter/ledger-finalize-records/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    paths:
      - 'coordinator-state-deleter/common/**'
      - 'coordinator-state-deleter/resumable-scan/**'
      - 'coordinator-state-deleter/ledger-finalize-records/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

defaults:
  run:
    working-directory: coordinator-state-deleter

jobs:
  check:
    name: Check (unit tests + spotless)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run check
        run: ./gradlew :common:check :resumable-scan:check :ledger-finalize-records:check

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-reports
          path: |
            coordinator-state-deleter/common/build/reports/tests/test/
            coordinator-state-deleter/resumable-scan/build/reports/tests/test/
            coordinator-state-deleter/ledger-finalize-records/build/reports/tests/test/

  integration-test:
    name: Cosmos DB integration test (resumable-scan)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :resumable-scan:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: coordinator-state-deleter/resumable-scan/build/reports/tests/cosmosIntegrationTest/

  ledger-finalize-integration-test:
    name: Cosmos DB integration test (ledger-finalize-records)
    needs: integration-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests
        env:
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          ./gradlew :ledger-finalize-records:cosmosIntegrationTest \
            -Dscalardb.cosmos.uri="$COSMOS_URI" \
            -Dscalardb.cosmos.password="$COSMOS_KEY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ledger-finalize-integration-test-reports
          path: coordinator-state-deleter/ledger-finalize-records/build/reports/tests/cosmosIntegrationTest/
