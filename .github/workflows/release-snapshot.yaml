name: Release SNAPSHOT

on:
  push:
    branches: [master]
    paths:
      - 'scalardl-cleanup/**'
      - '.github/workflows/release-snapshot.yaml'
  workflow_dispatch:

# Serialize runs per ref and cancel superseded ones so the mutable SNAPSHOT tag
# always ends up pointing at the newest commit.
concurrency:
  group: release-snapshot-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: scalardl-cleanup

jobs:
  release:
    name: Build and push the SNAPSHOT container image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set version
        id: version
        run: |
          VERSION=$(./gradlew :cli:properties -q | grep "version:" | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Create SNAPSHOT container image
        if: contains(steps.version.outputs.version, '-SNAPSHOT')
        run: ./gradlew :cli:docker

      - name: Push SNAPSHOT container image
        if: contains(steps.version.outputs.version, '-SNAPSHOT')
        run: docker push ghcr.io/scalar-labs/scalardl-cleanup:${{ steps.version.outputs.version }}
