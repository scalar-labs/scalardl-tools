# Route all log output to stderr so that stdout carries only the command's final JSON result
status=warn
name=CoordinatorStateDeleterCliConfig
appender.console.type=Console
appender.console.name=stderr
appender.console.target=SYSTEM_ERR
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
rootLogger.level=info
rootLogger.appenderRef.stderr.ref=stderr
