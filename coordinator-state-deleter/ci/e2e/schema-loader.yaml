# Schema-loader Jobs — run BEFORE deploying the servers.
#
# envsubst variables (see manage-cluster.sh):
#   ${LEDGER_NS} / ${AUDITOR_NS}   namespaces (must already exist)
#   ${SCHEMA_LOADER_IMAGE}         e.g. ghcr.io/scalar-labs/scalardl-schema-loader:3.13.0
#   ${COSMOS_URI} / ${COSMOS_KEY}  Cosmos DB account URI / primary key
#
# The image entrypoint runs:  java -jar /app.jar -f ${SCHEMA_TYPE}-schema.json $@
# The schema JSON (ledger-schema.json / auditor-schema.json) is baked into the
# image, but database.properties is NOT present in the 3.13.0 image, so we mount
# our own via a ConfigMap and point --config at it. This also avoids relying on
# ${env:...} resolution inside a baked properties file.
#
# The ledger Job also passes --coordinator so ScalarDB's Consensus Commit
# coordinator table (coordinator.state) is created. That table is NOT in
# ledger-schema.json (which only defines scalar.*), yet it is exactly what the
# ledger commits to and what coordinator-state-cleanup later prunes. The auditor
# side has no coordinator table, so its Job omits --coordinator.

apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-loader-config
  namespace: ${LEDGER_NS}
data:
  database.properties: |
    scalar.db.storage=cosmos
    scalar.db.contact_points=${COSMOS_URI}
    scalar.db.password=${COSMOS_KEY}

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-loader-config
  namespace: ${AUDITOR_NS}
data:
  database.properties: |
    scalar.db.storage=cosmos
    scalar.db.contact_points=${COSMOS_URI}
    scalar.db.password=${COSMOS_KEY}

---

apiVersion: batch/v1
kind: Job
metadata:
  name: schema-loader-ledger
  namespace: ${LEDGER_NS}
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: schema-loader-ledger
          image: ${SCHEMA_LOADER_IMAGE}
          args: ["--config", "/config/database.properties", "--coordinator"]
          env:
            - name: SCHEMA_TYPE
              value: "ledger"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: schema-loader-config

---

apiVersion: batch/v1
kind: Job
metadata:
  name: schema-loader-auditor
  namespace: ${AUDITOR_NS}
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: schema-loader-auditor
          image: ${SCHEMA_LOADER_IMAGE}
          args: ["--config", "/config/database.properties"]
          env:
            - name: SCHEMA_TYPE
              value: "auditor"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: schema-loader-config
